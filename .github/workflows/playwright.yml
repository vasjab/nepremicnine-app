name: Playwright E2E

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 75
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm

    - uses: supabase/setup-cli@v1
      with:
        version: 2.75.0

    - name: Verify Docker
      run: docker version

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    - name: Start local Supabase stack
      shell: bash
      run: |
        set -euo pipefail
        for attempt in 1 2 3; do
          if supabase start; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "Supabase failed to start after ${attempt} attempts." >&2
            exit 1
          fi
          echo "Supabase start failed on attempt ${attempt}; retrying..." >&2
          sleep $((attempt * 5))
        done

    - name: Run Playwright tests
      run: npm run test:e2e

    - name: Stop local Supabase stack
      if: always()
      run: supabase stop --no-backup || true

    - uses: actions/upload-artifact@v5
      if: always()
      with:
        name: playwright-report
        path: |
          playwright-report/
          test-results/
        retention-days: 30
