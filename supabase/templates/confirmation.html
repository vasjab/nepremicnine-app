<html>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 40px 20px; background-color: #f4f4f5;">
  <div style="max-width: 400px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="color: #18181b; margin: 0 0 8px 0;">Welcome to hemma</h2>
    <p style="color: #71717a; font-size: 14px; margin: 0 0 24px 0;">Enter this code to confirm your account</p>
    <div style="background: linear-gradient(135deg, #3b82f6, #4f46e5); border-radius: 8px; padding: 20px; margin-bottom: 24px;">
      <span style="color: #ffffff; font-size: 32px; font-weight: 700; letter-spacing: 8px;">{{ .Token }}</span>
    </div>
    <p style="color: #a1a1aa; font-size: 12px; margin: 0;">This code expires in 10 minutes. If you didn't sign up, you can safely ignore this email.</p>
  </div>
</body>
</html>
